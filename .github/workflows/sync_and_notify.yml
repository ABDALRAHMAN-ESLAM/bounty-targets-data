name: Sync Fork and Notify Discord

on:
  schedule:
    # يعمل السكربت تلقائياً كل ساعة لفحص وجود تحديثات في المستودع الأصلي
    - cron: '0 * * * *'
  workflow_dispatch: # يتيح لك تشغيل السكربت يدوياً في أي وقت للتجربة

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    steps:
      # 1. عمل Clone للمستودع الخاص بك
      - name: Checkout Your Fork
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. ربط المستودع الأصلي كـ Upstream وسحب التحديثات منه
      - name: Sync with Upstream
        id: sync
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # إضافة المستودع الأصلي لـ arkadiyt
          git remote add upstream https://github.com/arkadiyt/bounty-targets-data.git
          git fetch upstream main
          
          # التحقق من وجود اختلافات قبل المزامنة
          if git diff --quiet HEAD upstream/main; then
            echo "CHANGED=false" >> $GITHUB_ENV
            echo "لا توجد تحديثات جديدة حالياً."
          else
            echo "CHANGED=true" >> $GITHUB_ENV
            # دمج التحديثات الجديدة في مستودعك
            git merge upstream/main --allow-unrelated-histories -m "Sync with upstream"
            git push origin main
            echo "تم تحديث البيانات بنجاح!"
          fi

      # 3. إرسال تنبيه لديسكورد في حال وجود شركات جديدة فقط
      - name: Send Discord Notification
        if: env.CHANGED == 'true'
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"🚀 **تحديث جديد ولحظي في برامج الـ Bug Bounty!**\\nتم سحب بيانات برامج جديدة أو تحديث الـ Scope من المستودع الأصلي تلقائياً. تفقد المنصات الآن لاقتناص الثغرات قبل الجميع! 🎯\"}" \
               ${{ secrets.DISCORD_WEBHOOK }}
