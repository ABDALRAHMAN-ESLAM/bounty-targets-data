name: Sync Fork and Notify Discord

on:
  schedule:
    - cron: '0 * * * *' # يعمل كل ساعة تلقائياً
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Your Fork
        uses: actions/checkout@v3
        with:
          fetch-depth: 1 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Fetch and Analyze Changes
        id: analyze
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          import json
          import os
          import urllib.request
          import subprocess

          def fetch_json(url):
              try:
                  with urllib.request.urlopen(url) as response:
                      return json.loads(response.read().decode())
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          # تنزيل البيانات الجديدة لايف
          h1_url = "https://raw.githubusercontent.com/arkadiyt/bounty-targets-data/main/data/hackerone_data.json"
          bc_url = "https://raw.githubusercontent.com/arkadiyt/bounty-targets-data/main/data/bugcrowd_data.json"
          
          new_h1 = fetch_json(h1_url)
          new_bc = fetch_json(bc_url)

          # قراءة البيانات القديمة المخزنة عندك
          old_h1 = []
          old_bc = []
          if os.path.exists('data/hackerone_data.json'):
              with open('data/hackerone_data.json', 'r') as f:
                  old_h1 = json.load(f)
          if os.path.exists('data/bugcrowd_data.json'):
              with open('data/bugcrowd_data.json', 'r') as f:
                  old_bc = json.load(f)

          # استخراج الأسماء القديمة للمقارنة
          old_h1_targets = {t['name'] for t in old_h1} if old_h1 else set()
          old_bc_targets = {t['name'] for t in old_bc} if old_bc else set()

          new_targets = []

          # فحص HackerOne
          if new_h1:
              for target in new_h1:
                  if target['name'] not in old_h1_targets:
                      new_targets.append(f"🔹 **{target['name']}** (HackerOne) - [الرابط]({target.get('url', '#')})")

          # فحص Bugcrowd
          if new_bc:
              for target in new_bc:
                  if target['name'] not in old_bc_targets:
                      new_targets.append(f"🔸 **{target['name']}** (Bugcrowd) - [الرابط]({target.get('url', '#')})")

          if new_targets:
              print("Found new targets!")
              # حفظ الملفات الجديدة للاستخدام القادم
              os.makedirs('data', exist_ok=True)
              with open('data/hackerone_data.json', 'w') as f:
                  json.dump(new_h1, f)
              with open('data/bugcrowd_data.json', 'w') as f:
                  json.dump(new_bc, f)
              
              # إعداد رسالة ديسكورد
              targets_str = "\\n".join(new_targets[:10]) # عرض أول 10 برامج جديدة كحد أقصى لحجم الرسالة
              payload = {
                  "content": f"🚀 **رادار الـ Bug Bounty رصد برامج جديدة مضافة الآن!**\\n\\n{targets_str}\\n\\n🎯 تفقد الأهداف السابقة وابدأ الفحص فوراً لمنع الـ Duplicate!"
              }
              
              req = urllib.request.Request(
                  os.environ['DISCORD_WEBHOOK_URL'],
                  data=json.dumps(payload).encode('utf-8'),
                  headers={'Content-Type': 'application/json', 'User-Agent': 'Mozilla/5.0'}
              )
              urllib.request.urlopen(req)
              
              # إخبار الـ GitHub Action بأن هناك تغيير ليقوم بعمل Commit
              with open(os.environ['GITHUB_ENV'], 'a') as ge:
                  ge.write("CHANGED=true\\n")
          else:
              print("No new targets found.")
              with open(os.environ['GITHUB_ENV'], 'a') as ge:
                  ge.write("CHANGED=false\\n")

      - name: Commit and Push Changes
        if: env.CHANGED == 'true'
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/*.json
          git commit -m "Update bounty targets data [skip ci]" || echo "No changes to commit"
          git push origin main
