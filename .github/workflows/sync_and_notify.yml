name: Sync Fork and Notify Discord

on:
  schedule:
    - cron: '0 * * * *' # يعمل كل ساعة تلقائياً
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Your Fork
        uses: actions/checkout@v3
        with:
          fetch-depth: 1 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Fetch and Analyze Changes
        id: analyze
        shell: python # هنا الإصلاح الضروري ليتم تشغيل الكود كـ Python وليس Bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_ENV: ${{ github.env }}
        run: |
          import json
          import os
          import urllib.request
          
          def fetch_json(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode())
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          # تنزيل البيانات الجديدة لايف
          h1_url = "https://raw.githubusercontent.com/arkadiyt/bounty-targets-data/main/data/hackerone_data.json"
          bc_url = "https://raw.githubusercontent.com/arkadiyt/bounty-targets-data/main/data/bugcrowd_data.json"
          
          new_h1 = fetch_json(h1_url)
          new_bc = fetch_json(bc_url)

          # قراءة البيانات القديمة المخزنة عندك
          old_h1_targets = set()
          old_bc_targets = set()
          
          if os.path.exists('data/hackerone_data.json'):
              try:
                  with open('data/hackerone_data.json', 'r') as f:
                      old_h1_targets = {t['name'] for t in json.load(f)}
              except: pass
          if os.path.exists('data/bugcrowd_data.json'):
              try:
                  with open('data/bugcrowd_data.json', 'r') as f:
                      old_bc_targets = {t['name'] for t in json.load(f)}
              except: pass

          new_targets = []

          # فحص HackerOne
          if new_h1:
              for target in new_h1:
                  if target['name'] not in old_h1_targets:
                      url = target.get('url', '#')
                      new_targets.append(f"🔹 **{target['name']}** (HackerOne) - [الرابط]({url})")

          # فحص Bugcrowd
          if new_bc:
              for target in new_bc:
                  if target['name'] not in old_bc_targets:
                      url = target.get('url', '#')
                      new_targets.append(f"🔸 **{target['name']}** (Bugcrowd) - [الرابط]({url})")

          # إذا وجدنا أهداف جديدة أو كانت هذه أول مرة يعمل فيها السكربت تماماً والملفات فارغة
          if new_targets or not os.path.exists('data/hackerone_data.json'):
              print(f"Found {len(new_targets)} new targets!")
              os.makedirs('data', exist_ok=True)
              if new_h1:
                  with open('data/hackerone_data.json', 'w') as f: json.dump(new_h1, f)
              if new_bc:
                  with open('data/bugcrowd_data.json', 'w') as f: json.dump(new_bc, f)
              
              # أرسل فقط إذا كانت هناك أهداف فعلية جديدة لمنع إشعار أول تشغيل الفارغ
              if new_targets:
                  targets_str = "\\n".join(new_targets[:10])
                  payload = {
                      "content": f"🚀 **رادار الـ Bug Bounty رصد برامج جديدة مضافة الآن!**\\n\\n{targets_str}\\n\\n🎯 تفقد النطاقات وابدأ الفحص فوراً لاقتناص الفرصة!"
                  }
                  
                  try:
                      req = urllib.request.Request(
                          os.environ['DISCORD_WEBHOOK_URL'],
                          data=json.dumps(payload).encode('utf-8'),
                          headers={'Content-Type': 'application/json', 'User-Agent': 'Mozilla/5.0'}
                      )
                      urllib.request.urlopen(req)
                  except Exception as e:
                      print(f"Discord error: {e}")
              
              with open(os.environ['GITHUB_ENV'], 'a') as ge:
                  ge.write("CHANGED=true\n")
          else:
              print("No new targets found.")
              with open(os.environ['GITHUB_ENV'], 'a') as ge:
                  ge.write("CHANGED=false\n")

      - name: Commit and Push Changes
        if: env.CHANGED == 'true'
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/*.json
          git commit -m "Update bounty targets data [skip ci]" || echo "No changes to commit"
          git push origin main
